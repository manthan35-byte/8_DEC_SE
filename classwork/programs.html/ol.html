<html>

<head>
<title>use of ul </title>
</head>

<body>
    
<ol>
    <li>python</li>
    <li>java script</li>
    <li>node js</li>
</ol> 
<hr>

<ol style="list-style-type: upper-alpha;">
    <li>python</li>
    <li>java script</li>
    <li>node js</li>
</ol> 
<hr>

<ol style="list-style: lower-alpha;">
    <li>python</li>
    <li>java script</li>
    <li>node js</li>
</ol> 
<hr>

<ol style="list-style: upper-roman;">
    <li>python</li>
    <li>java script</li>
    <li>node js</li>
</ol> 
<hr>

<ol style="list-style: lower-roman;">
    <li>python</li>
    <li>java script</li>
    <li>node js</li>
</ol> 
<hr>

<ol start="4">
    <li>c</li>
    <li>c++</li>
    <li>sql</li>
</ol> 
<hr>

</body>
</html>
