<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table
        {
            border: 2px solid black;
            border-collapse: collapse;
            width: 100%;
        }
        tr,td,th 
        {
            border: 2px solid white;
            padding: 10px;
        }
        th
        {
            background-color: black;
            color: rgb(223,223,223);
        }
        tr,td
        {
            background-color: rgb(11, 28, 61);
            color: white;
        }
        body
        {
            background-color: rgb(225, 194, 201);
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <th>ID</th>
            <th>NAME</th>
            <th>SUBJECT</th>
            <th>SCORE</th>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>ajay</td>
                <td>java</td>
                <td>76</td>
            </tr>

            <tr>
                <td>2</td>
                <td>shayam</td>
                <td>python</td>
                <td>95</td>
            </tr>

            <tr>
                <td>3</td>
                <td>ram</td>
                <td>c++</td>
                <td>85</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
